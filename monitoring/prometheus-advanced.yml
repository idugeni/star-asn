global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'production'
    service: 'star-asn'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - 'alert_rules.yml'

scrape_configs:
  - job_name: 'star-asn-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'star-asn-bot'
    static_configs:
      - targets: ['bot:8001']
    metrics_path: '/metrics'

  - job_name: 'star-asn-worker'
    static_configs:
      - targets: ['worker:8002']
    metrics_path: '/metrics'

  - job_name: 'docker-daemon'
    static_configs:
      - targets: ['localhost:9323']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
