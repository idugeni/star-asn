x-build: &star-asn-build
  context: .
  dockerfile: Dockerfile
  target: runtime

x-develop: &star-asn-develop
  watch:
    - action: rebuild
      path: pyproject.toml
    - action: sync+restart
      path: api/
      target: /app/api
    - action: sync+restart
      path: star_attendance/
      target: /app/star_attendance

x-runtime-env: &star-asn-runtime-env
  PYTHONUNBUFFERED: "1"
  STARTUP_MAX_ATTEMPTS: "6"
  STARTUP_RETRY_DELAY_SECONDS: "5"

x-service-defaults: &star-asn-service-dev
  build: *star-asn-build
  image: star-asn:latest
  env_file:
    - .env
  init: true
  stop_grace_period: 30s
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"

services:
  bootstrap:
    <<: *star-asn-service-dev
    develop: *star-asn-develop
    container_name: star-asn-bootstrap-dev
    environment:
      <<: *star-asn-runtime-env
      LOG_LEVEL: DEBUG
    command: ["bootstrap"]
    deploy:
      restart_policy:
        condition: none
    profiles:
      - dev

  api:
    <<: *star-asn-service-dev
    develop: *star-asn-develop
    container_name: star-asn-api-dev
    environment:
      <<: *star-asn-runtime-env
      INTERNAL_API_URL: http://api:11800
      INTERNAL_API_HEALTHCHECK_URL: http://127.0.0.1:11800
      LOG_LEVEL: DEBUG
    ports:
      - "127.0.0.1:11800:11800"
    command: ["api"]
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
    depends_on:
      - bootstrap
    healthcheck:
      test: ["CMD", "python", "-m", "star_attendance.service_runner", "check-api"]
      start_period: 30s
      interval: 15s
      timeout: 10s
      retries: 3
    profiles:
      - dev

  worker:
    <<: *star-asn-service-dev
    develop: *star-asn-develop
    container_name: star-asn-worker-dev
    environment:
      <<: *star-asn-runtime-env
      INTERNAL_API_URL: http://api:11800
      LOG_LEVEL: DEBUG
    command: ["worker"]
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
    depends_on:
      - bootstrap
      - api
    profiles:
      - dev

  bot:
    <<: *star-asn-service-dev
    develop: *star-asn-develop
    container_name: star-asn-bot-dev
    environment:
      <<: *star-asn-runtime-env
      INTERNAL_API_URL: http://api:11800
      LOG_LEVEL: DEBUG
    command: ["bot"]
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
    depends_on:
      - bootstrap
      - api
    profiles:
      - dev

networks:
  default:
    name: star-asn-network-dev
