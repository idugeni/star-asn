x-build: &star-asn-build
  context: .
  dockerfile: Dockerfile
  target: runtime


x-runtime-env: &star-asn-runtime-env
  PYTHONUNBUFFERED: "1"
  STARTUP_MAX_ATTEMPTS: "6"
  STARTUP_RETRY_DELAY_SECONDS: "5"

x-service-defaults: &star-asn-service
  build: *star-asn-build
  image: star-asn:latest
  env_file:
    - .env
  init: true
  stop_grace_period: 30s
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  api:
    <<: *star-asn-service
    container_name: star-asn-api
    environment:
      <<: *star-asn-runtime-env
      INTERNAL_API_URL: http://api:11800
      INTERNAL_API_HEALTHCHECK_URL: http://127.0.0.1:11800
    ports:
      - "127.0.0.1:11800:11800"
    command: ["api-full"]
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    healthcheck:
      test: ["CMD", "python", "-m", "star_attendance.service_runner", "check-api"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    <<: *star-asn-service
    container_name: star-asn-worker
    environment:
      <<: *star-asn-runtime-env
      INTERNAL_API_URL: http://api:11800
    command: ["worker"]
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    depends_on:
      api:
        condition: service_healthy

  bot:
    <<: *star-asn-service
    container_name: star-asn-bot
    environment:
      <<: *star-asn-runtime-env
      INTERNAL_API_URL: http://api:11800
    command: ["bot"]
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    depends_on:
      api:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: star-asn-web
    ports:
      - "11080:80"
    restart: unless-stopped
    depends_on:
      - api

  portainer:
    image: portainer/portainer-ce:latest
    container_name: star-asn-portainer
    ports:
      - "11900:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: star-asn-uptime
    ports:
      - "11301:3001"
    volumes:
      - uptime_data:/app/data
    restart: unless-stopped

networks:
  default:
    name: star-asn-network

volumes:
  portainer_data:
  uptime_data:
