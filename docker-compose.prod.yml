version: '3.8'

x-service-defaults: &star-asn-service
  build:
    context: .
    dockerfile: Dockerfile
  image: star-asn:latest
  env_file:
    - .env
  init: true
  stop_grace_period: 30s
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"
  networks:
    - star-asn-network
  deploy:
    restart_policy:
      condition: on-failure
      delay: 5s
      max_attempts: 3

services:
  bootstrap:
    <<: *star-asn-service
    command: bootstrap
    deploy:
      replicas: 1
      restart_policy:
        condition: none
      placement:
        constraints: [node.role == manager]

  api:
    <<: *star-asn-service
    command: api
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-m", "star_attendance.service_runner", "check-api"]
      start_period: 30s
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
      update_config:
        parallelism: 1
        delay: 10s

  worker:
    <<: *star-asn-service
    command: worker
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.8'
          memory: 1G
        reservations:
          cpus: '0.4'
          memory: 512M

  bot:
    <<: *star-asn-service
    command: bot
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '0.8'
          memory: 1G
        reservations:
          cpus: '0.4'
          memory: 512M

  # --- MONITORING & MANAGEMENT ---
  portainer:
    image: portainer/portainer-ce:latest
    ports:
      - "9000:9000"
      - "8001:8001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - star-asn-network
    deploy:
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
    environment:
      - INITIAL_ADMIN_PASSWORD=Star@ASN2026!

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    ports:
      - "3001:3001"
    volumes:
      - uptime_data:/app/data
    networks:
      - star-asn-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    environment:
      - TZ=Asia/Jakarta

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - star-asn-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - star-asn-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=Star@ASN2026!
      - GF_SECURITY_ADMIN_USER=admin

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - star-asn-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    command: -config.file=/etc/loki/local-config.yaml

networks:
  star-asn-network:
    driver: overlay

volumes:
  portainer_data:
  uptime_data:
  prometheus_data:
  grafana_data:
  loki_data:
